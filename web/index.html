<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tamagotchi — Outside World</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: Arial, sans-serif; }
    canvas { border: 3px solid #444; image-rendering: pixelated; }
    #ui { color: white; display: flex; gap: 20px; margin-bottom: 10px; font-size: 14px; align-items: center; }
    #go-home { background: #c97ab8; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; }
    #go-home:hover { background: #a85a98; }
    #status { color: #aaa; font-size: 12px; margin-top: 6px; }
  </style>
</head>
<body>
  <div id="ui">
    <span>❤️ Health: <b id="health">10</b></span>
    <span>🍖 Food: <b id="food">0</b></span>
    <span>⚔️ Kills: <b id="kills">0</b></span>
    <button id="go-home">Go home</button>
  </div>
  <canvas id="game" width="600" height="300"></canvas>
  <div id="status">Arrow keys to move, Space to attack</div>

  <script>
    const SERVER = "http://localhost:5000";
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    // --- notify server knight is outside ---
    fetch(`${SERVER}/go_outside`, { method: "POST" });

    // --- go home button ---
    document.getElementById("go-home").onclick = async () => {
      await fetch(`${SERVER}/return`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ food_collected: food })
      });
      document.getElementById("status").textContent = "Knight returned home!";
      setTimeout(() => window.close(), 1000);
    };

    // --- load sprites ---
    function loadImage(src) {
      const img = new Image();
      img.src = src;
      return img;
    }

    const sprites = {
      idle:  loadImage("../sprites/idle.png"),
      run:   loadImage("../sprites/run.png"),
      jump:  loadImage("../sprites/jump.png"),
      hurt:  loadImage("../sprites/hurt.png"),
      die:   loadImage("../sprites/die.png"),
      press: loadImage("../sprites/press.png"),
    };

    const FRAME_W = 16;
    const FRAME_H = 24;
    const SCALE = 4;
    const FRAMES = 4;

    // --- game state ---
    let food = 0;
    let kills = 0;
    let health = 10;
    let frame = 0;
    let frameTick = 0;

    // --- knight ---
    const knight = {
      x: 80, y: 200,
      vx: 0, vy: 0,
      onGround: false,
      facing: 1,  // 1 = right, -1 = left
      state: "idle",  // idle, run, jump, hurt, die, attack
      attackTimer: 0,
      hurtTimer: 0,
    };

    const GROUND = 220;
    const GRAVITY = 0.6;
    const JUMP_FORCE = -12;
    const SPEED = 3;

    // --- keys ---
    const keys = {};
    window.addEventListener("keydown", e => keys[e.code] = true);
    window.addEventListener("keyup",   e => keys[e.code] = false);

    // --- monsters ---
    let monsters = [];
    let monsterTick = 0;

    function spawnMonster() {
      monsters.push({
        x: Math.random() > 0.5 ? 620 : -40,
        y: GROUND,
        hp: 3,
        speed: 0.8 + Math.random() * 0.5,
        hurtTimer: 0,
      });
    }

    // --- food items ---
    let foodItems = [];

    function drawSprite(img, frameIndex, x, y, flipX) {
      ctx.save();
      if (flipX) {
        ctx.translate(x + FRAME_W * SCALE, y);
        ctx.scale(-1, 1);
        ctx.drawImage(img, frameIndex * FRAME_W, 0, FRAME_W, FRAME_H, 0, 0, FRAME_W * SCALE, FRAME_H * SCALE);
      } else {
        ctx.drawImage(img, frameIndex * FRAME_W, 0, FRAME_W, FRAME_H, x, y, FRAME_W * SCALE, FRAME_H * SCALE);
      }
      ctx.restore();
    }

    function drawBackground() {
      // sky
      ctx.fillStyle = "#87CEEB";
      ctx.fillRect(0, 0, 600, 260);
      // ground
      ctx.fillStyle = "#5a8a3c";
      ctx.fillRect(0, 260, 600, 40);
      ctx.fillStyle = "#4a7a2c";
      ctx.fillRect(0, 260, 600, 8);
      // clouds
      ctx.fillStyle = "white";
      ctx.fillRect(80, 40, 60, 20);
      ctx.fillRect(90, 30, 40, 20);
      ctx.fillRect(300, 60, 80, 20);
      ctx.fillRect(310, 48, 60, 20);
      ctx.fillRect(500, 35, 70, 20);
      ctx.fillRect(510, 25, 50, 20);
    }

    function update() {
      // --- knight movement ---
      if (knight.state !== "die") {
        if (knight.attackTimer > 0) {
          knight.attackTimer--;
          knight.state = "attack";
        } else if (knight.hurtTimer > 0) {
          knight.hurtTimer--;
          knight.state = "hurt";
        } else {
          knight.vx = 0;
          if (keys["ArrowLeft"])  { knight.vx = -SPEED; knight.facing = -1; }
          if (keys["ArrowRight"]) { knight.vx =  SPEED; knight.facing =  1; }
          if ((keys["ArrowUp"] || keys["Space"]) && knight.onGround) {
            knight.vy = JUMP_FORCE;
            knight.onGround = false;
          }
          if (keys["KeyZ"] || keys["KeyX"]) {
            knight.attackTimer = 15;
            knight.state = "attack";
            // check hit on monsters
            monsters.forEach(m => {
              const dist = Math.abs(m.x - knight.x);
              if (dist < 80 && Math.sign(m.x - knight.x) === knight.facing) {
                m.hp--;
                m.hurtTimer = 20;
                if (m.hp <= 0) {
                  foodItems.push({ x: m.x, y: m.y - 10 });
                  kills++;
                  document.getElementById("kills").textContent = kills;
                }
              }
            });
          } else {
            if (knight.vx !== 0) knight.state = "run";
            else if (!knight.onGround) knight.state = "jump";
            else knight.state = "idle";
          }
        }

        knight.x += knight.vx;
        knight.vy += GRAVITY;
        knight.y += knight.vy;

        if (knight.y >= GROUND) {
          knight.y = GROUND;
          knight.vy = 0;
          knight.onGround = true;
        }

        knight.x = Math.max(0, Math.min(600 - FRAME_W * SCALE, knight.x));
      }

      // --- monsters ---
      monsterTick++;
      if (monsterTick > 180) {
        monsterTick = 0;
        spawnMonster();
      }

      monsters = monsters.filter(m => m.hp > 0);
      monsters.forEach(m => {
        if (m.hurtTimer > 0) { m.hurtTimer--; return; }
        const dir = knight.x > m.x ? 1 : -1;
        m.x += dir * m.speed;

        // hurt knight on contact
        if (Math.abs(m.x - knight.x) < 40 && knight.hurtTimer === 0 && knight.state !== "die") {
          health--;
          knight.hurtTimer = 30;
          document.getElementById("health").textContent = health;
          if (health <= 0) knight.state = "die";
        }
      });

      // --- food collection ---
      foodItems = foodItems.filter(f => {
        if (Math.abs(f.x - knight.x) < 40) {
          food++;
          document.getElementById("food").textContent = food;
          return false;
        }
        return true;
      });

      // --- animation ---
      frameTick++;
      if (frameTick >= 4) {
        frameTick = 0;
        frame = (frame + 1) % FRAMES;
      }
    }

    function draw() {
      ctx.clearRect(0, 0, 600, 300);
      drawBackground();

      // draw food items
      foodItems.forEach(f => {
        ctx.fillStyle = "#e74c3c";
        ctx.beginPath();
        ctx.arc(f.x + 8, f.y, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#27ae60";
        ctx.fillRect(f.x + 6, f.y - 12, 4, 8);
      });

      // draw monsters (red squares for now)
      monsters.forEach(m => {
        ctx.fillStyle = m.hurtTimer > 0 ? "#ff6666" : "#c0392b";
        ctx.fillRect(m.x, m.y - 40, 32, 40);
        ctx.fillStyle = "white";
        ctx.font = "10px Arial";
        ctx.fillText("👹", m.x + 4, m.y - 15);
        // hp bar
        ctx.fillStyle = "#333";
        ctx.fillRect(m.x, m.y - 48, 32, 5);
        ctx.fillStyle = "#e74c3c";
        ctx.fillRect(m.x, m.y - 48, (m.hp / 3) * 32, 5);
      });

      // draw knight
      const spriteMap = {
        idle: sprites.idle,
        run: sprites.run,
        jump: sprites.jump,
        hurt: sprites.hurt,
        die: sprites.die,
        attack: sprites.press,
      };
      const img = spriteMap[knight.state] || sprites.idle;
      drawSprite(img, frame, knight.x, knight.y - FRAME_H * SCALE, knight.facing === -1);
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
